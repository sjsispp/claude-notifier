pluginGroup=io.claudenotifier
pluginName=claude-notifier-idea
pluginVersion=0.1.0
pluginSinceBuild=242
platformType=IC
platformVersion=2024.2.5

# Performance
org.gradle.jvmargs=-Xmx2g
org.gradle.parallel=true
kotlin.stdlib.default.dependency=false

# Pin Java home to bundled IntelliJ JBR (JDK 25) so dev machines without standalone JDK17 can build.
# Override by exporting JAVA_HOME or org.gradle.java.home before running gradlew.
org.gradle.java.home=/Applications/IntelliJ IDEA.app/Contents/jbr/Contents/Home
